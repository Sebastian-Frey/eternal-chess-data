name: Chess Referee

on:
  repository_dispatch:
    types: [chess-move]

permissions:
  contents: write

jobs:
  validate-move:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python-chess
        run: pip install python-chess

      - name: Validate and apply move
        run: python referee.py
        env:
          INPUT_MOVE: ${{ github.event.client_payload.move }}
          INPUT_PLAYER: ${{ github.event.client_payload.player }}

      - name: Commit updated game state
        run: |
          git config user.name "chess-referee[bot]"
          git config user.email "chess-referee[bot]@users.noreply.github.com"
          git add game_state.json
          git commit -m "♟ ${{ github.event.client_payload.player }}: ${{ github.event.client_payload.move }}"
          git push
